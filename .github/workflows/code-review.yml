name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - develop
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > review_script.py
          import os
          import json
          import subprocess

          from google import genai

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          # diff만 가져오기 (토큰 절약)
          try:
              diff = subprocess.check_output(
                  ["git", "diff", "origin/${{ github.base_ref }}...HEAD",
                   "--", "*.java", "*.kt"]
              ).decode("utf-8")

              # diff 크기 제한 (토큰 절약)
              if len(diff) > 8000:
                  diff = diff[:8000] + "\n... (이하 생략)"

          except:
              diff = "diff 가져오기 실패"

          # 간결한 프롬프트 (토큰 절약)
          prompt = f"""
          Java/Kotlin Spring Boot Senior Engineer로서 PR을 리뷰해주세요.
          제공된 diff에 존재하는 문제만 지적하세요.

          [중점 항목]
          - Null 안전성
          - 트랜잭션 처리
          - 예외 처리
          - 네이버 Java 코딩 컨벤션 준수
          - 불필요한 코드

          [응답 형식]
          - 한국어로 응답
          - 🔴 반드시 수정
          - 🟡 수정 권장
          - 문제 없으면 "✅ 리뷰 완료" 한 줄만

          [Diff]
          {diff}
          """

          try:
              response = client.models.generate_content(
                  model='models/gemini-2.0-flash-lite',
                  contents=prompt
              )
              body = response.text
          except Exception as e:
              body = f"⚠️ AI 리뷰 오류: {e}"

          # 기존 봇 코멘트 수정, 없으면 새로 작성
          pr_number = "${{ github.event.pull_request.number }}"
          repo = "${{ github.repository }}"

          try:
              comments_json = subprocess.check_output([
                  "gh", "api",
                  f"repos/{repo}/issues/{pr_number}/comments"
              ]).decode("utf-8")
              comments = json.loads(comments_json)
              bot_comment = next(
                  (c for c in comments
                   if c["user"]["login"] == "github-actions[bot]"),
                  None
              )
          except:
              bot_comment = None

          with open("review_message.txt", "w", encoding="utf-8") as f:
              f.write(body)

          if bot_comment:
              with open("patch_body.json", "w", encoding="utf-8") as f:
                  json.dump({"body": body}, f, ensure_ascii=False)
              subprocess.run([
                  "gh", "api",
                  f"repos/{repo}/issues/comments/{bot_comment['id']}",
                  "-X", "PATCH", "--input", "patch_body.json"
              ])
          else:
              subprocess.run([
                  "gh", "pr", "comment", pr_number,
                  "--body-file", "review_message.txt"
              ])
          EOF
          python review_script.py
