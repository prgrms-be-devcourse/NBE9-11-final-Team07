name: CI - Test
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew
      - name: Run tests
        run: ./backend/gradlew -p backend test --info -Dspring.profiles.active=test
