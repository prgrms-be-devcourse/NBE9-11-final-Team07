name: Deploy to EC2

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        run: ./backend/gradlew -p backend clean build -x test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/jonguk-jeong/popspot:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u jonguk-jeong --password-stdin
            docker pull ghcr.io/jonguk-jeong/popspot:latest

            BLUE_RUNNING=$(docker ps -q --filter "name=popspot-blue")

            if [ -n "$BLUE_RUNNING" ]; then
              TARGET=popspot-green
              TARGET_PORT=8081
              OLD=popspot-blue
            else
              TARGET=popspot-blue
              TARGET_PORT=8080
              OLD=popspot-green
            fi

            docker run -d \
              --name $TARGET \
              --restart unless-stopped \
              -p $TARGET_PORT:8080 \
              --link redis:redis \
              --env-file ~/popspot/backend.env \
              ghcr.io/jonguk-jeong/popspot:latest

            for i in $(seq 1 12); do
              STATUS=$(curl -s http://localhost:$TARGET_PORT/actuator/health | grep -o '"status":"UP"')
              if [ "$STATUS" = '"status":"UP"' ]; then
                echo "헬스체크 통과"
                break
              fi
              echo "대기 중... ($i/12)"
              sleep 5
            done

            if [ "$STATUS" != '"status":"UP"' ]; then
              echo "헬스체크 실패 - 롤백"
              docker rm -f $TARGET
              exit 1
            fi

            if [ -n "$(docker ps -q --filter name=$OLD)" ]; then
              docker rm -f $OLD
            fi

            echo "배포 완료: $TARGET ($TARGET_PORT)"
